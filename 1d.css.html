<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* जरूरी: ताकि पैडिंग विड्थ से बाहर न जाए */
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>पंजीकरण (Register)</h2>
    <form action="#">
        <div class="form-group">
            <label for="name">पूरा नाम</label>
            <input type="text" id="name" placeholder="अपना नाम लिखें" required>
        </div>
        <div class="form-group">
            <label for="email">ईमेल</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label for="password">पासवर्ड</label>
            <input type="password" id="password" placeholder="कम से कम 6 अक्षर" required>
        </div>
        <button type="submit">साइन अप करें</button>
    </form>
    <div class="footer">
        पहले से अकाउंट है? <a href="#" style="color: #007bff; text-decoration: none;">लॉगिन करें</a>
    </div>
</div>

</body>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mobile Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>AI दस्तावेज़ स्कैनर</h1>
        
        <!-- कैमरा व्यू -->
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="controls">
            <button id="capture-btn">फ़ोटो खींचें (Scan)</button>
            <button id="download-btn" style="display:none;">Download PDF</button>
        </div>

        <div id="preview-container">
            <h3>Preview:</h3>
            <img id="photo-preview" src="" alt="">
        </div>
    </div>

    <script src="script.js"></script>
    <!-- PDF बनाने के लिए लाइब्रेरी -->
    <script src="https://cdnjs.cloudflare.com"></script>
</body>
</html>
